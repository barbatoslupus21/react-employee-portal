services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: repconnect
      MYSQL_USER: repconnect
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3311:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend/repconnect
    restart: unless-stopped
    environment:
      TZ: Asia/Manila
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,192.168.10.244,nginx"
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: repconnect
      DB_USER: repconnect
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_HOST: db
      DB_PORT: "3306"
      CSRF_TRUSTED_ORIGINS: "http://192.168.10.244:3001,http://localhost:3001"
      CORS_ALLOWED_ORIGINS: "http://192.168.10.244:3001,http://localhost:3001"
      JWT_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "3005:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend


volumes:
  mysql_data:
  media_data:
  static_data:
