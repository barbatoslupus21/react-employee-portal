# Use Docker's embedded DNS so hostnames are re-resolved dynamically
# when containers restart and get new IPs.
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

upstream nextjs {
    server frontend:3000;
}

upstream django {
    server backend:8000;
}

# ── HTTP server ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Uncomment when TLS is ready to redirect HTTP → HTTPS:
    # return 301 https://$host$request_uri;

    client_max_body_size 55m;

    # Django admin UI
    location /admin/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django static files (whitenoise serves /static/ directly from Gunicorn)
    location /static/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # Django media files
    location /media/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Next.js API routes that must be served by Next.js (not Django).
    # Nginx longest-prefix matching means this wins over /api/ below.
    location /api/cert-proxy {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django API endpoints — routed directly so nginx's real-IP headers
    # reach Django intact. Next.js rewrites swallow X-Forwarded-For,
    # which caused all users to share one rate-limit bucket (172.24.0.1).
    location /api/ {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

